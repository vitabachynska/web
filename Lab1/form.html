<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Запис на медконсультацію</title>
  <style>
  label {
	display: block
  }
  </style>
</head>
<body>
<header><h1>Запис на медконсультацію</h1></header>
<main>
<fieldset>
  <legend>Запис</legend>
  <form action="/search" method="POST">
  
  <label for="name">ПІБ
<input type="text" id="name" name="name" required></label>

 <label for="date_birth">Дата народження
<input type="date"  id="date_birth"   name="date_birth"  required></label>

<label for="phone">Телефон (+380...)
<input type="tel"  id="phone" pattern="\+380\d{9}" placeholder="+380\d{9}" required></label>
  
  <label for="email">Електронна пошта
<input type="email" id="email" name="email" required></label>


<label for="doctor">Спеціалізація лікаря
    <select name="doctor">
      <option value="dentist">Стоматолог</option>
      <option value="cardiologist">Кардіолог</option>
      <option value="traumatologist">Травматолог</option>
    </select>
</label>
  
  <label for="date_wanted">Бажана дата
<input type="date"  id="date_wanted" min="2026-05-16"name="date_wanted" required></label>

<label for="time_wanted">Бажаний час
    <select name="time_wanted">
      <option value="10">10</option>
      <option value="11">11</option>
      <option value="12">12</option>
    </select>
</label>

<label for="agreement">Згода на обробку даних
<input type="checkbox" name="agreement" required></label>
  <button type="submit">Записатись</button>
</form>
</fieldset></main>
</body>
</html>
